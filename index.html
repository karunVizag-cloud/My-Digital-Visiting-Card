                                        █▀▀▀▀▀█ ▀█ █ █▀▀▀▀▀█<br/>█ ███ █ ▄▀ ▄ █ ███ █<br/>█ ▀▀▀ █ █▄█  █ ▀▀▀ █<br/>▀▀▀▀▀▀▀ ▀▄█ ▀▀▀▀▀▀▀<br/>
                                    </div>
                                    <div className="bg-white rounded-full p-2 absolute transform shadow-lg"><Icons.QRCodeMatch className="text-brand-600"/></div>
                                </div>
                            </div>
                        </div>
                        <button className="w-full bg-brand-500 text-white font-bold py-4 rounded-full flex items-center justify-center gap-2 shadow-lg shadow-brand-200 hover:bg-brand-600 mb-4">
                            <Icons.Share /> Share Profile Link
                        </button>
                    </div>
                    <BottomNav />
                </div>
            );
        };

        const EditProfile = () => {
            const { userData, setUserData } = useContext(AppContext);
            const [formData, setFormData] = useState(userData);
            const navigate = useNavigate();

            const handleChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
            const handleSave = () => { setUserData(formData); navigate('/card/my'); };

            return (
                <div className="min-h-screen bg-[#fdfaf9] pb-24 relative md:max-w-md md:mx-auto md:border-x md:border-slate-200 md:shadow-2xl">
                    <div className="p-6 flex items-center justify-between sticky top-0 bg-[#fdfaf9]/90 backdrop-blur z-20 shadow-sm border-b">
                        <span onClick={() => navigate(-1)} className="text-brand-600 cursor-pointer text-xl font-bold">✕</span>
                        <h1 className="text-lg font-bold text-brand-700 tracking-tight">Edit Profile</h1>
                        <div className="w-4"></div>
                    </div>
                    <div className="px-5 py-4 space-y-6">
                        <div className="bg-brand-50/70 p-6 rounded-[2.5rem] flex flex-col items-center border border-brand-100/50 shadow-sm">
                            <img src={formData.profileImage} className="w-24 h-24 rounded-full border-4 border-white shadow-md mb-3 object-cover" />
                            <button className="bg-brand-200/50 font-bold text-brand-900 text-sm px-6 py-2 rounded-full">Change Photo</button>
                        </div>
                        <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                            <h2 className="text-lg font-bold text-slate-800 mb-4">Personal Details</h2>
                            <div className="space-y-4">
                                <label className="text-xs font-medium text-slate-600 block mb-1">Full Name</label>
                                <input type="text" name="name" value={formData.name} onChange={handleChange} className="w-full bg-brand-50/50 px-4 py-3 rounded-2xl outline-none" />
                                <label className="text-xs font-medium text-slate-600 block mb-1">Job Title</label>
                                <input type="text" name="title" value={formData.title} onChange={handleChange} className="w-full bg-brand-50/50 px-4 py-3 rounded-xl outline-none" />
                                <label className="text-xs font-medium text-slate-600 block mb-1">Company Name</label>
                                <input type="text" name="company" value={formData.company} onChange={handleChange} className="w-full bg-brand-50/50 px-4 py-3 rounded-xl outline-none" />
                            </div>
                        </div>
                        <div className="flex gap-4 pt-4">
                            <button onClick={() => navigate(-1)} className="flex-1 bg-brand-100 text-brand-900 font-bold py-4 rounded-3xl">Cancel</button>
                            <button onClick={handleSave} className="flex-1 bg-brand-500 text-white font-bold py-4 rounded-3xl">Save Changes</button>
                        </div>
                    </div>
                    <BottomNav />
                </div>
            );
        };

        const App = () => {
            return (
                <AppProvider>
                    <HashRouter>
                        <Routes>
                            <Route path="/" element={<Login />} />
                            <Route path="/verify" element={<Verify />} />
                            <Route path="/card/:id" element={<PublicCard />} />
                            <Route path="/qr" element={<QRCodeView />} />
                            <Route path="/edit" element={<EditProfile />} />
                            <Route path="/contacts" element={<div className="h-screen bg-slate-50 flex items-center justify-center"><h2 className="font-bold">Contacts List</h2><BottomNav/></div>} />
                        </Routes>
                    </HashRouter>
                </AppProvider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
